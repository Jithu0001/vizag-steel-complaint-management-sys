version: '3.8'

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: vizag-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: vizag-steel-cms
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - vizag-network

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: vizag-redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - vizag-network

  # ─── App (uncomment for full containerized setup) ───────────────────────────
  # app:
  #   build: .
  #   container_name: vizag-cms-app
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: production
  #     MONGO_URI: mongodb://admin:password123@mongodb:27017/vizag-steel-cms?authSource=admin
  #     REDIS_HOST: redis
  #     REDIS_PORT: 6379
  #     REDIS_PASSWORD: redispassword
  #   ports:
  #     - '5000:5000'
  #   depends_on:
  #     - mongodb
  #     - redis
  #   networks:
  #     - vizag-network

volumes:
  mongodb_data:
  redis_data:

networks:
  vizag-network:
    driver: bridge
